<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星级统计应用</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background: #f4f6fa;
            color: #222;
            margin: 0;
            padding: 24px;
        }

        .app {
            max-width: 920px;
            margin: 0 auto;
        }

        .panel {
            background: #fff;
            border: 1px solid #e6eaf2;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            padding: 24px;
        }

        .stack {
            display: grid;
            gap: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(280px, 1fr));
            gap: 20px;
            align-items: start;
        }

        h1,
        h2 {
            margin: 0;
            color: #202938;
        }

        h1 {
            font-size: 28px;
            text-align: center;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-top: 16px;
            color: #475569;
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #fff;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 11px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .copy-button {
            width: auto;
            min-width: 72px;
            margin-top: 0;
            padding: 7px 12px;
            font-size: 14px;
        }

        .hint,
        .reset-info {
            color: #64748b;
            font-size: 14px;
            line-height: 1.6;
        }

        .reset-info {
            text-align: center;
        }

        .tiers {
            display: grid;
            grid-template-columns: repeat(4, minmax(64px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }

        .tier {
            padding: 8px 6px;
            background: #eef4ff;
            border: 1px solid #cfe0ff;
            border-radius: 6px;
            color: #1e3a8a;
            text-align: center;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
            word-break: break-word;
        }

        th {
            background: #f8fafc;
            color: #334155;
            font-size: 14px;
        }

        .rooms {
            display: grid;
            gap: 10px;
        }

        .room-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            background: #fff;
        }

        .room-number {
            color: #0f172a;
            font-size: 18px;
            font-weight: 700;
        }

        .room-tier {
            margin-top: 4px;
            color: #64748b;
            font-size: 14px;
        }

        @media (max-width: 760px) {
            body {
                padding: 16px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .panel {
                padding: 18px;
            }

            .room-card {
                align-items: stretch;
                flex-direction: column;
            }

            .copy-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="app stack">
        <h1>星级统计应用</h1>

        <section class="grid">
            <div class="panel">
                <h2>提交星级</h2>
                <form id="starForm">
                    <label for="userId">你的 ID</label>
                    <input type="text" id="userId" required maxlength="20" placeholder="请输入你的 ID">

                    <label for="starCount">星级个数</label>
                    <input type="number" id="starCount" required min="0" max="999" placeholder="请输入星级个数">

                    <label for="rewardTier">选择档位</label>
                    <select id="rewardTier" required></select>

                    <button type="submit">提交</button>
                </form>
            </div>

            <div class="panel">
                <h2>添加房间号</h2>
                <form id="roomForm">
                    <label for="roomNumber">房间号</label>
                    <input type="text" id="roomNumber" required maxlength="40" placeholder="请输入房间号">

                    <label for="roomTier">总星级档位</label>
                    <select id="roomTier" required></select>

                    <button type="submit">添加房间号</button>
                </form>
            </div>
        </section>

        <section class="panel">
            <h2>可选档位</h2>
            <p class="hint">提交星级或添加房间号时，选择对应的总星级档位。</p>
            <div class="tiers" id="rewardTiers"></div>
        </section>

        <div class="reset-info" id="resetInfo"></div>

        <section class="panel">
            <h2>房间号列表</h2>
            <div class="rooms" id="roomList"></div>
        </section>

        <section class="panel">
            <h2>个人排行榜</h2>
            <table id="leaderboardTable">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>ID</th>
                        <th>星级数量</th>
                        <th>选择档位</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

    <script>
        const API_BASE = 'https://star-backend-vuv2.onrender.com/api';
        const FALLBACK_REWARD_TIERS = [30, 40, 50, 60, 75, 90, 105, 120];

        function setTableMessage(message) {
            const tbody = document.querySelector('#leaderboardTable tbody');
            tbody.innerHTML = '';

            const tr = document.createElement('tr');
            const td = document.createElement('td');
            td.colSpan = 4;
            td.textContent = message;
            tr.appendChild(td);
            tbody.appendChild(tr);
        }

        function renderRoomMessage(message) {
            const roomList = document.getElementById('roomList');
            roomList.innerHTML = '';

            const text = document.createElement('p');
            text.className = 'hint';
            text.textContent = message;
            roomList.appendChild(text);
        }

        function appendTierOptions(select, tiers) {
            select.innerHTML = '';
            tiers.forEach((tier) => {
                const option = document.createElement('option');
                option.value = tier;
                option.textContent = `${tier} 档`;
                select.appendChild(option);
            });
        }

        function renderRewardTiers(tiers) {
            const rewardTiers = document.getElementById('rewardTiers');
            rewardTiers.innerHTML = '';

            tiers.forEach((tier) => {
                const item = document.createElement('div');
                item.className = 'tier';
                item.textContent = tier;
                rewardTiers.appendChild(item);
            });

            appendTierOptions(document.getElementById('rewardTier'), tiers);
            appendTierOptions(document.getElementById('roomTier'), tiers);
        }

        async function updateRewardTiers() {
            try {
                const res = await fetch(`${API_BASE}/reward-tiers`);
                if (!res.ok) {
                    throw new Error('获取奖励档位失败');
                }

                const data = await res.json();
                renderRewardTiers(data.tiers || FALLBACK_REWARD_TIERS);
            } catch (error) {
                renderRewardTiers(FALLBACK_REWARD_TIERS);
            }
        }

        async function updateLeaderboard() {
            const tbody = document.querySelector('#leaderboardTable tbody');
            setTableMessage('加载中...');

            try {
                const res = await fetch(`${API_BASE}/leaderboard`);
                if (!res.ok) {
                    throw new Error('获取排行榜失败');
                }

                const arr = await res.json();
                if (!Array.isArray(arr) || arr.length === 0) {
                    setTableMessage('暂无数据');
                    return;
                }

                tbody.innerHTML = '';
                arr.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    const rankTd = document.createElement('td');
                    const idTd = document.createElement('td');
                    const starTd = document.createElement('td');
                    const tierTd = document.createElement('td');

                    rankTd.textContent = index + 1;
                    idTd.textContent = item.id;
                    starTd.textContent = item.star;
                    tierTd.textContent = item.reward_tier ? `${item.reward_tier} 档` : '-';

                    tr.append(rankTd, idTd, starTd, tierTd);
                    tbody.appendChild(tr);
                });
            } catch (error) {
                setTableMessage('加载失败，请稍后再试');
            }
        }

        async function updateRooms() {
            renderRoomMessage('加载中...');

            try {
                const res = await fetch(`${API_BASE}/rooms`);
                if (!res.ok) {
                    throw new Error('获取房间号失败');
                }

                const rooms = await res.json();
                if (!Array.isArray(rooms) || rooms.length === 0) {
                    renderRoomMessage('暂无房间号');
                    return;
                }

                const roomList = document.getElementById('roomList');
                roomList.innerHTML = '';

                rooms.forEach((room) => {
                    const card = document.createElement('div');
                    card.className = 'room-card';

                    const info = document.createElement('div');
                    const number = document.createElement('div');
                    number.className = 'room-number';
                    number.textContent = room.room_number;
                    const tier = document.createElement('div');
                    tier.className = 'room-tier';
                    tier.textContent = `总星级档位：${room.reward_tier} 档`;
                    info.append(number, tier);

                    const copyButton = document.createElement('button');
                    copyButton.type = 'button';
                    copyButton.className = 'copy-button';
                    copyButton.textContent = '复制';
                    copyButton.addEventListener('click', async () => {
                        try {
                            await navigator.clipboard.writeText(room.room_number);
                            copyButton.textContent = '已复制';
                            setTimeout(() => {
                                copyButton.textContent = '复制';
                            }, 1200);
                        } catch (error) {
                            const input = document.createElement('input');
                            input.value = room.room_number;
                            document.body.appendChild(input);
                            input.select();
                            document.execCommand('copy');
                            document.body.removeChild(input);
                            alert('已复制房间号');
                        }
                    });

                    card.append(info, copyButton);
                    roomList.appendChild(card);
                });
            } catch (error) {
                renderRoomMessage('加载失败，请稍后再试');
            }
        }

        async function updateResetInfo() {
            const resetInfo = document.getElementById('resetInfo');

            try {
                const res = await fetch(`${API_BASE}/resetinfo`);
                if (!res.ok) {
                    throw new Error('获取重置信息失败');
                }

                const data = await res.json();
                resetInfo.textContent = `所有记录将在下次周一（${data.next_reset}）自动归零`;
            } catch (error) {
                resetInfo.textContent = '无法获取重置信息';
            }
        }

        const form = document.getElementById('starForm');
        form.addEventListener('submit', async function (event) {
            event.preventDefault();

            const id = document.getElementById('userId').value.trim();
            const star = Number(document.getElementById('starCount').value);
            const rewardTier = Number(document.getElementById('rewardTier').value);

            if (!id) {
                alert('请输入 ID');
                return;
            }

            if (!Number.isInteger(star) || star < 0 || star > 999) {
                alert('请输入 0 到 999 之间的整数');
                return;
            }

            if (!FALLBACK_REWARD_TIERS.includes(rewardTier)) {
                alert('请选择有效的奖励档位');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, star, reward_tier: rewardTier })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    alert('提交成功！');
                    form.reset();
                    updateLeaderboard();
                } else {
                    alert(data.msg || '提交失败');
                }
            } catch (error) {
                alert('提交失败，请检查网络连接');
            }
        });

        const roomForm = document.getElementById('roomForm');
        roomForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            const roomNumber = document.getElementById('roomNumber').value.trim();
            const rewardTier = Number(document.getElementById('roomTier').value);

            if (!roomNumber) {
                alert('请输入房间号');
                return;
            }

            if (!FALLBACK_REWARD_TIERS.includes(rewardTier)) {
                alert('请选择有效的总星级档位');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/rooms`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ room_number: roomNumber, reward_tier: rewardTier })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    alert('房间号已添加！');
                    roomForm.reset();
                    updateRooms();
                } else {
                    alert(data.msg || '添加失败');
                }
            } catch (error) {
                alert('添加失败，请检查网络连接');
            }
        });

        updateRewardTiers();
        updateLeaderboard();
        updateRooms();
        updateResetInfo();
    </script>
</body>
</html>
