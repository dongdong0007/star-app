<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星级统计应用</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background: #f4f6fa;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 32px 24px 24px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            display: block;
            margin-top: 18px;
            color: #555;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            margin-top: 22px;
            width: 100%;
            padding: 10px;
            background: #4f8cff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #2563d6;
        }

        .leaderboard {
            margin-top: 36px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            padding: 10px 0;
            text-align: center;
            border-bottom: 1px solid #eee;
            word-break: break-word;
        }

        th {
            background: #f0f4fa;
            color: #333;
        }

        .reset-info {
            margin-top: 18px;
            color: #888;
            font-size: 14px;
            text-align: center;
        }

        @media (max-width: 560px) {
            body {
                padding: 16px;
            }

            .container {
                margin: 0 auto;
                padding: 24px 16px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>星级统计应用</h2>
        <form id="starForm">
            <label for="userId">你的 ID：</label>
            <input type="text" id="userId" required maxlength="20" placeholder="请输入你的 ID">

            <label for="starCount">星级个数：</label>
            <input type="number" id="starCount" required min="0" max="999" placeholder="请输入星级个数">

            <button type="submit">提交</button>
        </form>

        <div class="reset-info" id="resetInfo"></div>

        <div class="leaderboard">
            <h3>排行榜</h3>
            <table id="leaderboardTable">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>ID</th>
                        <th>星级数量</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = 'https://star-backend-vuv2.onrender.com/api';

        function setTableMessage(message) {
            const tbody = document.querySelector('#leaderboardTable tbody');
            tbody.innerHTML = '';

            const tr = document.createElement('tr');
            const td = document.createElement('td');
            td.colSpan = 3;
            td.textContent = message;
            tr.appendChild(td);
            tbody.appendChild(tr);
        }

        async function updateLeaderboard() {
            const tbody = document.querySelector('#leaderboardTable tbody');
            setTableMessage('加载中...');

            try {
                const res = await fetch(`${API_BASE}/leaderboard`);
                if (!res.ok) {
                    throw new Error('获取排行榜失败');
                }

                const arr = await res.json();
                if (!Array.isArray(arr) || arr.length === 0) {
                    setTableMessage('暂无数据');
                    return;
                }

                tbody.innerHTML = '';
                arr.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    const rankTd = document.createElement('td');
                    const idTd = document.createElement('td');
                    const starTd = document.createElement('td');

                    rankTd.textContent = index + 1;
                    idTd.textContent = item.id;
                    starTd.textContent = item.star;

                    tr.append(rankTd, idTd, starTd);
                    tbody.appendChild(tr);
                });
            } catch (error) {
                setTableMessage('加载失败，请稍后再试');
            }
        }

        async function updateResetInfo() {
            const resetInfo = document.getElementById('resetInfo');

            try {
                const res = await fetch(`${API_BASE}/resetinfo`);
                if (!res.ok) {
                    throw new Error('获取重置信息失败');
                }

                const data = await res.json();
                resetInfo.textContent = `所有记录将在下次周一（${data.next_reset}）自动归零`;
            } catch (error) {
                resetInfo.textContent = '无法获取重置信息';
            }
        }

        const form = document.getElementById('starForm');
        form.addEventListener('submit', async function (event) {
            event.preventDefault();

            const id = document.getElementById('userId').value.trim();
            const star = Number(document.getElementById('starCount').value);

            if (!id) {
                alert('请输入 ID');
                return;
            }

            if (!Number.isInteger(star) || star < 0 || star > 999) {
                alert('请输入 0 到 999 之间的整数');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, star })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    alert('提交成功！');
                    form.reset();
                    updateLeaderboard();
                } else {
                    alert(data.msg || '提交失败');
                }
            } catch (error) {
                alert('提交失败，请检查网络连接');
            }
        });

        updateLeaderboard();
        updateResetInfo();
    </script>
</body>
</html>
